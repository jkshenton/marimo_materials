<svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="130" height="130" fill="#151c2e"/>
  <!-- equatorial square bonds -->
  <line x1="65" y1="30" x2="100" y2="65" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".5"/>
  <line x1="100" y1="65" x2="65" y2="100" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".5"/>
  <line x1="65" y1="100" x2="30" y2="65" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".5"/>
  <line x1="30" y1="65" x2="65" y2="30" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".5"/>
  <!-- apical bonds - main -->
  <line x1="65" y1="10" x2="65" y2="30" stroke="#3df0c2" stroke-width="1.4" stroke-opacity=".4"/>
  <line x1="65" y1="120" x2="65" y2="100" stroke="#3df0c2" stroke-width="1.4" stroke-opacity=".4"/>
  <!-- apical to equatorial cross-bonds -->
  <line x1="65" y1="10" x2="100" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".25"/>
  <line x1="65" y1="10" x2="30" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".25"/>
  <line x1="65" y1="120" x2="100" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".25"/>
  <line x1="65" y1="120" x2="30" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".25"/>
  <!-- face shading -->
  <polygon points="65,10 100,65 65,65" fill="rgba(91,138,248,.06)"/>
  <polygon points="65,10 30,65 65,65" fill="rgba(61,240,194,.04)"/>
  <polygon points="65,120 100,65 65,65" fill="rgba(91,138,248,.04)"/>
  <polygon points="65,120 30,65 65,65" fill="rgba(61,240,194,.06)"/>
  <!-- equatorial O atoms -->
  <circle cx="65" cy="30" r="6" fill="#151c2e" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="65" cy="30" r="2.5" fill="#5b8af8"/>
  <circle cx="100" cy="65" r="6" fill="#151c2e" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="100" cy="65" r="2.5" fill="#5b8af8"/>
  <circle cx="65" cy="100" r="6" fill="#151c2e" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="65" cy="100" r="2.5" fill="#5b8af8"/>
  <circle cx="30" cy="65" r="6" fill="#151c2e" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="30" cy="65" r="2.5" fill="#5b8af8"/>
  <!-- apical O atoms -->
  <circle cx="65" cy="10" r="6" fill="#151c2e" stroke="#3df0c2" stroke-width="1.8"/>
  <circle cx="65" cy="10" r="2.5" fill="#3df0c2"/>
  <circle cx="65" cy="120" r="6" fill="#151c2e" stroke="#3df0c2" stroke-width="1.8"/>
  <circle cx="65" cy="120" r="2.5" fill="#3df0c2"/>
  <!-- center B-site nucleus -->
  <circle cx="65" cy="65" r="12" fill="rgba(91,138,248,.1)"/>
  <circle cx="65" cy="65" r="8" fill="#151c2e" stroke="#5b8af8" stroke-width="2.2"/>
  <circle cx="65" cy="65" r="3.5" fill="#5b8af8"/>
</svg>
