<svg width="130" height="130" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- No background — transparent, works on any color -->
  <!-- equatorial square bonds -->
  <line x1="65" y1="30" x2="100" y2="65" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".7"/>
  <line x1="100" y1="65" x2="65" y2="100" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".7"/>
  <line x1="65" y1="100" x2="30" y2="65" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".7"/>
  <line x1="30" y1="65" x2="65" y2="30" stroke="#5b8af8" stroke-width="1.4" stroke-opacity=".7"/>
  <!-- apical bonds -->
  <line x1="65" y1="10" x2="65" y2="30" stroke="#3df0c2" stroke-width="1.4" stroke-opacity=".6"/>
  <line x1="65" y1="120" x2="65" y2="100" stroke="#3df0c2" stroke-width="1.4" stroke-opacity=".6"/>
  <line x1="65" y1="10" x2="100" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".3"/>
  <line x1="65" y1="10" x2="30" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".3"/>
  <line x1="65" y1="120" x2="100" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".3"/>
  <line x1="65" y1="120" x2="30" y2="65" stroke="#3df0c2" stroke-width="1.1" stroke-opacity=".3"/>
  <!-- equatorial O atoms (no fill = transparent center) -->
  <circle cx="65" cy="30" r="6" fill="rgba(0,0,0,0)" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="65" cy="30" r="2.5" fill="#5b8af8"/>
  <circle cx="100" cy="65" r="6" fill="rgba(0,0,0,0)" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="100" cy="65" r="2.5" fill="#5b8af8"/>
  <circle cx="65" cy="100" r="6" fill="rgba(0,0,0,0)" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="65" cy="100" r="2.5" fill="#5b8af8"/>
  <circle cx="30" cy="65" r="6" fill="rgba(0,0,0,0)" stroke="#5b8af8" stroke-width="1.8"/>
  <circle cx="30" cy="65" r="2.5" fill="#5b8af8"/>
  <!-- apical O atoms -->
  <circle cx="65" cy="10" r="6" fill="rgba(0,0,0,0)" stroke="#3df0c2" stroke-width="1.8"/>
  <circle cx="65" cy="10" r="2.5" fill="#3df0c2"/>
  <circle cx="65" cy="120" r="6" fill="rgba(0,0,0,0)" stroke="#3df0c2" stroke-width="1.8"/>
  <circle cx="65" cy="120" r="2.5" fill="#3df0c2"/>
  <!-- center B-site nucleus -->
  <circle cx="65" cy="65" r="12" fill="rgba(91,138,248,.1)"/>
  <circle cx="65" cy="65" r="8" fill="rgba(0,0,0,0)" stroke="#5b8af8" stroke-width="2.2"/>
  <circle cx="65" cy="65" r="3.5" fill="#5b8af8"/>
</svg>
